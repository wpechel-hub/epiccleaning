<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBD094"/>
      <stop offset="50%" stop-color="#D4AF6A"/>
      <stop offset="100%" stop-color="#AA8649"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EBD094"/>
      <stop offset="100%" stop-color="#AA8649"/>
    </linearGradient>
  </defs>

  <!-- Circle ring -->
  <circle cx="50" cy="50" r="46" stroke="url(#goldRing)" stroke-width="3" fill="none"/>

  <!-- Top bar (full width, slightly angled) -->
  <rect x="22" y="32" width="54" height="8" rx="4" fill="url(#goldBar)" transform="rotate(-4 49 36)"/>

  <!-- Middle bar (slightly shorter) -->
  <rect x="22" y="46" width="54" height="8" rx="4" fill="url(#goldBar)" transform="rotate(-4 49 50)"/>

  <!-- Bottom bar (shortest) -->
  <rect x="22" y="60" width="44" height="8" rx="4" fill="url(#goldBar)" transform="rotate(-4 44 64)"/>
</svg>
