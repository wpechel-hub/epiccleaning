<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Card — Epic Cleaning Co</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 16px;
      font-family: 'Inter', sans-serif;
    }

    .hint {
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    /* ── Card shell ── */
    .card {
      width: 3.62in;
      height: 2.12in;
      background: #000;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0.22in 0.3in 0.22in 0.3in;
    }

    /* outer gold border */
    .card { border: 1px solid rgba(201,168,76,0.35); }

    /* corner accents */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
    }
    .card::before {
      top: 16px; left: 16px;
      border-top: 1.5px solid #C9A84C;
      border-left: 1.5px solid #C9A84C;
    }
    .card::after {
      bottom: 16px; right: 16px;
      border-bottom: 1.5px solid #C9A84C;
      border-right: 1.5px solid #C9A84C;
    }

    /* subtle radial glow */
    .glow {
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Top: logo + brand ── */
    .top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 68px;
      height: 68px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.06em;
      line-height: 1;
    }
    .brand-name .gold { color: #C9A84C; }

    .brand-tagline {
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, #C9A84C 0%, rgba(201,168,76,0.15) 60%, transparent 100%);
    }

    /* ── Bottom: name + contacts ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .person-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.1em;
      line-height: 1.3;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .contact-label {
      font-size: 6.5px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C9A84C;
    }

    .contact-value {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.6);
    }

    /* ── Back side ── */
    .card-back {
      justify-content: center;
      align-items: center;
    }

    .logo-back {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }

    /* ── Print ── */
    @media print {
      body { background: #fff; }
      .hint { display: none; }
      .card {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="glow"></div>

    <div class="top">
      <img src="./public/logo_semfundo.png" alt="Logo" class="logo">
      <div class="brand">
        <div class="brand-name">Epic <span class="gold">Cleaning</span> Co</div>
        <div class="brand-tagline">Premium Cleaning Services</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bottom">
      <div class="person-name">Willian<br>Pechel</div>
      <div class="contacts">
        <div class="contact-row">
          <span class="contact-label">T</span>
          <span class="contact-value">(385) 556-9335</span>
        </div>
        <div class="contact-row">
          <span class="contact-label">E</span>
          <span class="contact-value">epicleanco@gmail.com</span>
        </div>
        <div class="contact-row">
          <span class="contact-label">W</span>
          <span class="contact-value">epiccleaningco.net</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card card-back">
    <img src="./public/logo_semfundo.png" alt="Logo" class="logo-back">
  </div>

  <p class="hint">Ctrl + P para imprimir &nbsp;·&nbsp; 3.5" × 2"</p>

</body>
</html>
